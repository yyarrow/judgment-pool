version: '3.8'

services:
  api:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 7473
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      DB_PATH: /data/judgment_pool.db
      INITIAL_CREDITS: ${INITIAL_CREDITS:-100}
      DAILY_TASK_LIMIT: ${DAILY_TASK_LIMIT:-20}
    volumes:
      - db_data:/data
    ports:
      - "7473:7473"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  db_data:
